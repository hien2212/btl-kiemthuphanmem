<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login – User Management</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-logo">
            <div class="logo-icon">👤</div>
            <h1>User Management</h1>
            <p>Sign in to your account</p>
        </div>

        <!-- Alerts -->
        <div th:if="${error}" class="alert alert-danger">
            ⚠️ <span th:text="${error}"></span>
        </div>
        <div th:if="${message}" class="alert alert-success">
            ✅ <span th:text="${message}"></span>
        </div>

        <form method="post" th:action="@{/login}">
            <div class="form-group">
                <label for="username">Username</label>
                <input id="username" name="username" type="text"
                       class="form-control" placeholder="Enter your username" required autofocus/>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" name="password" type="password"
                       class="form-control" placeholder="Enter your password" required/>
            </div>
            <button type="submit" class="btn btn-primary btn-block" style="margin-top:8px;">
                🔐 Sign In
            </button>
        </form>

        <div class="auth-link">
            Don't have an account? <a th:href="@{/register}">Register here</a>
        </div>

        <!-- Default credentials hint -->
        <div style="margin-top:20px; padding:12px; background:#f8fafc; border-radius:8px; font-size:12px; color:#6b7280; border:1px solid #e2e8f0;">
            <strong>Default accounts:</strong><br/>
            Admin: <code>admin</code> / <code>admin123</code><br/>
            User: <code>user1</code> / <code>user123</code>
        </div>
    </div>
</div>
</body>
</html>
