# Server
server.port=8080

# H2 Database (in-memory, no installation needed)
spring.datasource.url=jdbc:h2:mem:userdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 Console (access at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf
spring.thymeleaf.cache=false

# JWT Secret (change in production!)
app.jwt.secret=MySuperSecretKeyForJWTTokenGenerationThatIsLongEnough123456
app.jwt.expiration=86400000

# App name
spring.application.name=UserManagementApp
